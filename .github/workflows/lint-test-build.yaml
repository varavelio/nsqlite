name: Lint, test, and build
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  lint-test-build:
    name: Lint, test, and build the code
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure .ssh directory exists even if it's empty
        run: mkdir -p /home/runner/.ssh

      - name: Run lint, test, and build
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            task lint
            task test
            task build
