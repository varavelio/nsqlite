version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - ineffassign
    - staticcheck
    - unused
    - modernize
    - bodyclose
    - godoclint
    - godot
    - errorlint
    - nilerr
    - nilnesserr
    - durationcheck
    - makezero
    - noctx

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    gofumpt:
      extra-rules: true
